# ──────────────────────────────────────────────────────────────
# CI/CD — Author Service
# Triggers on changes to services/author/** on main branch or PR
# Pipeline: Lint → Test → Build → Docker Push (ECR) → Deploy (EC2)
# ──────────────────────────────────────────────────────────────

name: CI/CD — Author Service

on:
  push:
    branches: [main]
    paths:
      - "services/author/**"
  pull_request:
    branches: [main]
    paths:
      - "services/author/**"
  workflow_dispatch:

env:
  SERVICE_NAME: author-service
  SERVICE_DIR: services/author
  ECR_REPOSITORY: blog-platform/author-service
  GO_VERSION: "1.26"

# Prevent concurrent deploys for the same service
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Install and run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  # ── Test ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ env.SERVICE_NAME }}
          path: ${{ env.SERVICE_DIR }}/coverage.out

  # ── Build ───────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ${{ env.SERVICE_NAME }} ./cmd/server/main.go

  # ── Docker Build & Push to ECR ──────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          SHA_TAG="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          LATEST_TAG="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}

  # ── Deploy to EC2 ──────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # Navigate to project directory
            cd ~/blog-platform

            # Pull the latest image for this service
            docker compose -f docker-compose.prod.yml pull ${{ env.SERVICE_NAME }}

            # Restart only this service (zero-downtime with health checks)
            docker compose -f docker-compose.prod.yml up -d ${{ env.SERVICE_NAME }}

            # Clean up old images
            docker image prune -f

            echo "✅ ${{ env.SERVICE_NAME }} deployed successfully (commit: ${{ github.sha }})"
