version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: blog-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretdbpassword
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - blog-network

  # ── MongoDB Database ─────────────────────────
  mongodb:
    image: mongo:6-jammy
    container_name: blog-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    networks:
      - blog-network

  # ── Redis Cache ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - blog-network

  # ── RabbitMQ Broker ──────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: blog-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Web Console
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: mysecretmqpassword
    restart: unless-stopped
    networks:
      - blog-network

  # ── User Service (Go — MongoDB + S3) ─────────
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    image: blog-platform/user-service:latest
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017
      - DB_NAME=MasterDB
      - JWT_SECRET=${JWT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_ENDPOINT=${AWS_ENDPOINT}
      - AWS_S3_FORCE_PATH_STYLE=${AWS_S3_FORCE_PATH_STYLE:-true}
      - Google_Client_Id=${GOOGLE_CLIENT_ID}
      - Google_client_Secret=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - mongodb
      - minio
    restart: unless-stopped
    networks:
      - blog-network

  # ── Author Service (Go — PostgreSQL + RabbitMQ + S3)
  author-service:
    build:
      context: ./services/author
      dockerfile: Dockerfile
    image: blog-platform/author-service:latest
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_URL=postgres://postgres:mysecretdbpassword@postgres:5432/postgres?sslmode=disable
      - Rabbitmq_Host=rabbitmq
      - Rabbitmq_Username=admin
      - Rabbitmq_Password=mysecretmqpassword
      - JWT_SECRET=${JWT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_ENDPOINT=${AWS_ENDPOINT}
      - AWS_S3_FORCE_PATH_STYLE=${AWS_S3_FORCE_PATH_STYLE:-true}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
      - rabbitmq
      - minio
    restart: unless-stopped
    networks:
      - blog-network

  # ── Blog Service (Go — PostgreSQL + Redis + RabbitMQ)
  blog-service:
    build:
      context: ./services/blog
      dockerfile: Dockerfile
    image: blog-platform/blog-service:latest
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DB_URL=postgres://postgres:mysecretdbpassword@postgres:5432/postgres?sslmode=disable
      - REDIS_URL=redis:6379
      - Rabbitmq_Host=rabbitmq
      - Rabbitmq_Username=admin
      - Rabbitmq_Password=mysecretmqpassword
      - USER_SERVICE=http://user-service:5002
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped
    networks:
      - blog-network

  # ── Frontend (Nginx + Quasar SPA) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_USER_SERVICE=${VITE_USER_SERVICE}
        - VITE_AUTHOR_SERVICE=${VITE_AUTHOR_SERVICE}
        - VITE_BLOG_SERVICE=${VITE_BLOG_SERVICE}
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    image: blog-platform/frontend:latest
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - blog-network

  # ── MinIO Object Storage (Self-Hosted S3) ────
  minio:
    image: minio/minio:RELEASE.2024-06-06T09-36-42Z
    container_name: blog-minio
    ports:
      - "9000:9000"   # API Port
      - "9001:9001"   # Console Port
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - blog-network

volumes:
  postgres-data:
  mongodb-data:
  minio-data:

networks:
  blog-network:
    driver: bridge
