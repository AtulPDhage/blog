# ──────────────────────────────────────────────────────────────
# Production Docker Compose — Blog Platform
# All images are pulled from Amazon ECR.
# Env vars are loaded from .env files on the EC2 host.
# ──────────────────────────────────────────────────────────────

services:
  # ── Frontend (Nginx + Quasar SPA) ─────────────
  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/blog-platform/frontend:latest
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - blog-network

  # ── User Service (Go — MongoDB) ───────────────
  user-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/blog-platform/user-service:latest
    ports:
      - "5002:5002"
    env_file:
      - ./envs/user-service.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - blog-network

  # ── Author Service (Go — PostgreSQL + RabbitMQ) 
  author-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/blog-platform/author-service:latest
    ports:
      - "5000:5000"
    env_file:
      - ./envs/author-service.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - blog-network

  # ── Blog Service (Go — PostgreSQL + Redis + RabbitMQ) 
  blog-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/blog-platform/blog-service:latest
    ports:
      - "5001:5001"
    env_file:
      - ./envs/blog-service.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge
